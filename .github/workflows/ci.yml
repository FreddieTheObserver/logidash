name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # npm install (not ci): a Windows-generated lockfile omits the Linux
      # Rolldown native binary that the web build (Vite 8) needs, due to npm's
      # optional-deps bug (npm/cli#4828). install heals the platform gap while
      # still honoring the versions pinned in the lockfile.
      - run: npm install
      - run: npm run db:generate -w @logidash/api
      - run: npm run lint:check
      - run: npm run format:check
      - run: npm run build
      - run: npm test
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: logidash
          POSTGRES_PASSWORD: logidash
          POSTGRES_DB: logidash
        ports:
          - 5432:5432
        options: --health-cmd "pg_isready -U logidash -d logidash" --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://logidash:logidash@localhost:5432/logidash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate -w @logidash/api
      - run: npm run db:migrate:deploy -w @logidash/api
      - run: npm run test:e2e -w @logidash/api
