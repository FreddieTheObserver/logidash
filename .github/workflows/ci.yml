name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @logidash/api db:generate
      - run: pnpm lint:check
      - run: pnpm format:check
      - run: pnpm build
      - run: pnpm test
      - run: pnpm gen:openapi
      - run: pnpm gen:client
      - name: Contract drift check
        run: git diff --exit-code -- apps/api/openapi.json packages/api-client/src/generated
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: logidash
          POSTGRES_PASSWORD: logidash
          POSTGRES_DB: logidash
        ports:
          - 5432:5432
        options: --health-cmd "pg_isready -U logidash -d logidash" --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://logidash:logidash@localhost:5432/logidash
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @logidash/api db:generate
      - run: pnpm --filter @logidash/api db:migrate:deploy
      - run: pnpm --filter @logidash/api test:e2e
