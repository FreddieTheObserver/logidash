services:
  postgres:
    image: postgres:16-alpine
    container_name: logidash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: logidash
      POSTGRES_PASSWORD: logidash
      POSTGRES_DB: logidash
    ports:
      - '5432:5432'
    volumes:
      - logidash-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U logidash -d logidash']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  logidash-pgdata:
